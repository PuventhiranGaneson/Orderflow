name: OrderFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Build Docker images
        run: |
          docker build -t ghcr.io/${{ env.OWNER_LC }}/orderflow-api:${{ github.sha }} ./OrderApi
          docker build -t ghcr.io/${{ env.OWNER_LC }}/orderflow-worker:${{ github.sha }} ./InventoryWorker

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER_LC }}/orderflow-api:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER_LC }}/orderflow-worker:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/orderflow-api:${{ github.sha }}
          docker push ghcr.io/${{ env.OWNER_LC }}/orderflow-worker:${{ github.sha }}

          docker tag ghcr.io/${{ env.OWNER_LC }}/orderflow-api:${{ github.sha }} ghcr.io/${{ env.OWNER_LC }}/orderflow-api:latest
          docker tag ghcr.io/${{ env.OWNER_LC }}/orderflow-worker:${{ github.sha }} ghcr.io/${{ env.OWNER_LC }}/orderflow-worker:latest
          docker push ghcr.io/${{ env.OWNER_LC }}/orderflow-api:latest
          docker push ghcr.io/${{ env.OWNER_LC }}/orderflow-worker:latest