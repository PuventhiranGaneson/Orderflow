name: OrderFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/orderflow-api
  WORKER_IMAGE: ghcr.io/${{ github.repository_owner }}/orderflow-worker

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Build Docker images
        run: |
          docker build -t ${{ env.API_IMAGE }}:${{ github.sha }} ./OrderApi
          docker build -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} ./InventoryWorker

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.API_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}

          docker tag ${{ env.API_IMAGE }}:${{ github.sha }} ${{ env.API_IMAGE }}:latest
          docker tag ${{ env.WORKER_IMAGE }}:${{ github.sha }} ${{ env.WORKER_IMAGE }}:latest
          docker push ${{ env.API_IMAGE }}:latest
          docker push ${{ env.WORKER_IMAGE }}:latest